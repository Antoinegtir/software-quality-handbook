<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <!-- Title -->
  <text x="350" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">Reviewer vs Author Workflow</text>
  
  <!-- REVIEWER SIDE -->
  <g>
    <text x="170" y="65" font-size="16" font-weight="bold" fill="#333">Reviewer's Checklist</text>
    
    <!-- Checklist items -->
    <rect x="40" y="85" width="260" height="220" rx="5" fill="#e3f2fd" stroke="#2196F3" stroke-width="2"/>
    
    <g>
      <circle cx="60" cy="110" r="4" fill="#4CAF50"/>
      <text x="75" y="115" font-size="12" fill="#333">Design: Well-architected?</text>
    </g>
    
    <g>
      <circle cx="60" cy="135" r="4" fill="#4CAF50"/>
      <text x="75" y="140" font-size="12" fill="#333">Functionality: Does it work?</text>
    </g>
    
    <g>
      <circle cx="60" cy="160" r="4" fill="#4CAF50"/>
      <text x="75" y="165" font-size="12" fill="#333">Complexity: Too complicated?</text>
    </g>
    
    <g>
      <circle cx="60" cy="185" r="4" fill="#4CAF50"/>
      <text x="75" y="190" font-size="12" fill="#333">Tests: Adequate coverage?</text>
    </g>
    
    <g>
      <circle cx="60" cy="210" r="4" fill="#4CAF50"/>
      <text x="75" y="215" font-size="12" fill="#333">Style: Follows conventions?</text>
    </g>
    
    <g>
      <circle cx="60" cy="235" r="4" fill="#4CAF50"/>
      <text x="75" y="240" font-size="12" fill="#333">Docs: Updated if needed?</text>
    </g>
    
    <g>
      <circle cx="60" cy="260" r="4" fill="#4CAF50"/>
      <text x="75" y="265" font-size="12" fill="#333">Response: Within 24 hours?</text>
    </g>
    
    <g>
      <circle cx="60" cy="285" r="4" fill="#4CAF50"/>
      <text x="75" y="290" font-size="12" fill="#333">Respect: Constructive tone?</text>
    </g>
  </g>
  
  <!-- AUTHOR SIDE -->
  <g>
    <text x="530" y="65" font-size="16" font-weight="bold" fill="#333">Author's Preparation</text>
    
    <!-- Preparation items -->
    <rect x="400" y="85" width="260" height="220" rx="5" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2"/>
    
    <g>
      <circle cx="420" cy="110" r="4" fill="#4CAF50"/>
      <text x="435" y="115" font-size="12" fill="#333">Small PR: 30 min review</text>
    </g>
    
    <g>
      <circle cx="420" cy="135" r="4" fill="#4CAF50"/>
      <text x="435" y="140" font-size="12" fill="#333">Clear description: Why?</text>
    </g>
    
    <g>
      <circle cx="420" cy="160" r="4" fill="#4CAF50"/>
      <text x="435" y="165" font-size="12" fill="#333">Self-review first</text>
    </g>
    
    <g>
      <circle cx="420" cy="185" r="4" fill="#4CAF50"/>
      <text x="435" y="190" font-size="12" fill="#333">Tests pass locally</text>
    </g>
    
    <g>
      <circle cx="420" cy="210" r="4" fill="#4CAF50"/>
      <text x="435" y="215" font-size="12" fill="#333">Follow style guide</text>
    </g>
    
    <g>
      <circle cx="420" cy="235" r="4" fill="#4CAF50"/>
      <text x="435" y="240" font-size="12" fill="#333">Add comments for complex logic</text>
    </g>
    
    <g>
      <circle cx="420" cy="260" r="4" fill="#4CAF50"/>
      <text x="435" y="265" font-size="12" fill="#333">Address feedback quickly</text>
    </g>
    
    <g>
      <circle cx="420" cy="285" r="4" fill="#4CAF50"/>
      <text x="435" y="290" font-size="12" fill="#333">Thank reviewers 🙏</text>
    </g>
  </g>
  
  <!-- Arrow -->
  <path d="M 310 190 L 390 190" stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="350" y="180" font-size="11" font-weight="bold" text-anchor="middle" fill="#666">Collaboration</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>
</svg>