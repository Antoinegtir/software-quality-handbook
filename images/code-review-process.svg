<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <!-- Title -->
  <text x="400" y="25" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Code Review Process Flow</text>
  
  <!-- Step 1: Create Branch -->
  <rect x="20" y="60" width="120" height="60" rx="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <text x="80" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="white">1. Create Branch</text>
  <text x="80" y="110" font-size="11" text-anchor="middle" fill="white">from main</text>
  
  <!-- Arrow -->
  <path d="M 150 90 L 180 90" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Make Changes -->
  <rect x="190" y="60" width="120" height="60" rx="5" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <text x="250" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="white">2. Make</text>
  <text x="250" y="107" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Changes</text>
  
  <!-- Arrow -->
  <path d="M 320 90 L 350 90" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Open PR -->
  <rect x="360" y="60" width="120" height="60" rx="5" fill="#FF9800" stroke="#333" stroke-width="2"/>
  <text x="420" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="white">3. Open</text>
  <text x="420" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Pull Request</text>
  
  <!-- Arrow -->
  <path d="M 490 90 L 520 90" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Get Review -->
  <rect x="530" y="60" width="120" height="60" rx="5" fill="#9C27B0" stroke="#333" stroke-width="2"/>
  <text x="590" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="white">4. Get Review</text>
  <text x="590" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="white">from Team</text>
  
  <!-- Arrow to feedback loop -->
  <path d="M 590 130 L 590 160" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M 590 160 L 250 160 L 250 130" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Feedback Loop Label -->
  <text x="420" y="180" font-size="12" text-anchor="middle" fill="#666">Address feedback &amp; make changes</text>
  
  <!-- Step 5: Merge -->
  <rect x="530" y="200" width="120" height="60" rx="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <text x="590" y="235" font-size="14" font-weight="bold" text-anchor="middle" fill="white">5. Merge to Main</text>
  <text x="590" y="250" font-size="12" text-anchor="middle" fill="white">After Approval</text>
  
  <!-- Arrow from Step 4 to Step 5 -->
  <path d="M 590 130 L 590 200" stroke="#4CAF50" stroke-width="3" fill="none" marker-end="url(#arrowhead-green)"/>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4CAF50"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <text x="20" y="280" font-size="11" fill="#666">✓ All tests pass • ✓ At least one review approval • ✓ Feedback addressed</text>
</svg>